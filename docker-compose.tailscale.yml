# Tailscale overlay — rebuilds with tsnet support for secure remote access.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.tailscale.yml up
#
# Required:
#   ARGOCLAW_TSNET_AUTH_KEY — Tailscale auth key (from https://login.tailscale.com/admin/settings/keys)
#
# Optional:
#   ARGOCLAW_TSNET_HOSTNAME — Tailscale device name (default: argoclaw-gateway)

services:
  argoclaw:
    build:
      args:
        ENABLE_TSNET: "true"
    environment:
      - ARGOCLAW_TSNET_HOSTNAME=${ARGOCLAW_TSNET_HOSTNAME:-argoclaw-gateway}
      - ARGOCLAW_TSNET_AUTH_KEY=${ARGOCLAW_TSNET_AUTH_KEY}
    volumes:
      - tsnet-state:/app/tsnet-state

volumes:
  tsnet-state:
