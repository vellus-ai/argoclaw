# Base docker-compose — shared service definition.
# Pre-built images: ghcr.io/nextlevelbuilder/argoclaw (also on Docker Hub: digitop/argoclaw)
#
# Combine with overlays for your deployment:
#
#   Recommended (+ Web Dashboard, pre-built images):
#     docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.selfservice.yml up -d
#
#   Build from source (add --build):
#     docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.selfservice.yml up -d --build
#
#   Without dashboard:  docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#   With OTel tracing:  docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.otel.yml up -d --build

services:
  argoclaw:
    image: ghcr.io/nextlevelbuilder/argoclaw:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "${ENABLE_OTEL:-false}"
        ENABLE_PYTHON: "${ENABLE_PYTHON:-true}"
        ENABLE_FULL_SKILLS: "${ENABLE_FULL_SKILLS:-false}"
    ports:
      - "${ARGOCLAW_PORT:-18790}:18790"
    env_file:
      - path: .env
        required: false
    environment:
      - ARGOCLAW_HOST=0.0.0.0
      - ARGOCLAW_PORT=18790
      - ARGOCLAW_CONFIG=/app/data/config.json
      - ARGOCLAW_GATEWAY_TOKEN=${ARGOCLAW_GATEWAY_TOKEN:-}
      - ARGOCLAW_ENCRYPTION_KEY=${ARGOCLAW_ENCRYPTION_KEY:-}
      - ARGOCLAW_SKILLS_DIR=/app/data/skills
      # Debug
      - ARGOCLAW_TRACE_VERBOSE=${ARGOCLAW_TRACE_VERBOSE:-0}
    volumes:
      - argoclaw-data:/app/data
      - argoclaw-workspace:/app/workspace
    security_opt:
      - no-new-privileges:true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    networks:
      - default
      - shared
    restart: unless-stopped

volumes:
  argoclaw-data:
  argoclaw-workspace:

networks:
  shared:
    name: shared
    driver: bridge
