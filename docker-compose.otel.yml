# OTel overlay — rebuilds with OTel support + adds Jaeger for trace visualization.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.otel.yml up
#
# Jaeger UI: http://localhost:16686

services:
  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  argoclaw:
    build:
      args:
        ENABLE_OTEL: "true"
    environment:
      - ARGOCLAW_TELEMETRY_ENABLED=true
      - ARGOCLAW_TELEMETRY_ENDPOINT=jaeger:4317
      - ARGOCLAW_TELEMETRY_PROTOCOL=grpc
      - ARGOCLAW_TELEMETRY_INSECURE=true
      - ARGOCLAW_TELEMETRY_SERVICE_NAME=argoclaw-gateway
    depends_on:
      jaeger:
        condition: service_started
