# Cloud Build — ArgoClaw
# Deploy automático SOMENTE para argoclaw-central.
# Para promover para argoclaw-customers: use scripts/promote.sh
steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=ENABLE_WEB_UI=true'
      - '--build-arg=VERSION=$TAG_NAME'
      - '-t'
      - '${_IMAGE}:$TAG_NAME'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'
    id: 'build'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_IMAGE}']
    id: 'push'
    waitFor: ['build']

  # Deploy SOMENTE argoclaw-central (customers NÃO é tocado)
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - '-n'
      - 'control-plane'
      - 'set'
      - 'image'
      - 'deployment/argoclaw-central'
      - 'argoclaw=${_IMAGE}:$TAG_NAME'
      - 'onboard=${_IMAGE}:$TAG_NAME'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER}'
    id: 'deploy-central'
    waitFor: ['push']

substitutions:
  _IMAGE: 'us-central1-docker.pkg.dev/vellus-ai-agent-platform/argoclaw/argoclaw'
  _CLUSTER: 'argoclaw-cluster'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
