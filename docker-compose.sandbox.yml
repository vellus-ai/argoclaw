# Sandbox overlay — enables Docker-based sandbox for agent code execution.
#
# Prerequisites:
#   1. Build the sandbox image:  docker build -t argoclaw-sandbox:bookworm-slim -f Dockerfile.sandbox .
#   2. Ensure Docker socket is accessible
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.sandbox.yml up
#
# SECURITY NOTE: Mounting Docker socket gives the container control over host Docker.
# Only use in trusted environments where agent code execution isolation is required.

services:
  argoclaw:
    build:
      args:
        ENABLE_SANDBOX: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ARGOCLAW_SANDBOX_MODE=all
      - ARGOCLAW_SANDBOX_IMAGE=argoclaw-sandbox:bookworm-slim
      - ARGOCLAW_SANDBOX_WORKSPACE_ACCESS=rw
      - ARGOCLAW_SANDBOX_SCOPE=session
      - ARGOCLAW_SANDBOX_MEMORY_MB=512
      - ARGOCLAW_SANDBOX_CPUS=1.0
      - ARGOCLAW_SANDBOX_TIMEOUT_SEC=300
      - ARGOCLAW_SANDBOX_NETWORK=false
    # Override base cap_drop to allow Docker socket access
    cap_drop: []
    cap_add:
      - NET_BIND_SERVICE
    security_opt: []
    group_add:
      - ${DOCKER_GID:-999}
