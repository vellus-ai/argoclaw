# Upgrade overlay — one-shot database upgrade service.
#
# Usage:
#   # Preview changes (dry-run):
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.upgrade.yml run --rm upgrade --dry-run
#
#   # Apply upgrade:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.upgrade.yml run --rm upgrade
#
#   # Check status:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.upgrade.yml run --rm upgrade --status
#
# The upgrade service runs argoclaw upgrade and exits. Use --rm to auto-remove the container.

services:
  upgrade:
    image: ghcr.io/nextlevelbuilder/argoclaw:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_OTEL: "false"
    env_file:
      - path: .env
        required: false
    environment:
      - ARGOCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-argoclaw}:${POSTGRES_PASSWORD:-argoclaw}@postgres:5432/${POSTGRES_DB:-argoclaw}?sslmode=disable
      - ARGOCLAW_CONFIG=/app/data/config.json
      - ARGOCLAW_MIGRATIONS_DIR=/app/migrations
      - ARGOCLAW_ENCRYPTION_KEY=${ARGOCLAW_ENCRYPTION_KEY:-}
    volumes:
      - argoclaw-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/argoclaw"]
    command: ["upgrade"]
    restart: "no"
