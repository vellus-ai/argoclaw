name: Monitor GoClaw Upstream PRs

on:
  schedule:
    # Daily at 08:00 UTC (05:00 BRT)
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  monitor-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ArgoClaw
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/nextlevelbuilder/goclaw.git || true
          git fetch upstream main --quiet

      - name: Fetch upstream open PRs
        id: fetch-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## GoClaw Upstream PR Report — $(date -u '+%Y-%m-%d')" > /tmp/pr-report.md
          echo "" >> /tmp/pr-report.md

          # Fetch open PRs from upstream
          gh pr list --repo nextlevelbuilder/goclaw --state open --limit 30 \
            --json number,title,author,createdAt,labels,additions,deletions \
            --jq '.[] | "\(.number)|\(.title)|\(.author.login)|\(.createdAt)|\(.additions)|\(.deletions)"' \
            > /tmp/upstream-prs.txt

          TOTAL=$(wc -l < /tmp/upstream-prs.txt)
          echo "total_prs=$TOTAL" >> $GITHUB_OUTPUT

          # Classify PRs
          echo "### Security/Bug Fixes (HIGH)" >> /tmp/pr-report.md
          echo "| PR | Title | Author | Lines |" >> /tmp/pr-report.md
          echo "|---|---|---|---|" >> /tmp/pr-report.md
          grep -iE "fix|security|crash|vulnerability|inject|xss|csrf" /tmp/upstream-prs.txt | while IFS='|' read -r num title author created adds dels; do
            echo "| #$num | $title | @$author | +$adds/-$dels |" >> /tmp/pr-report.md
          done
          echo "" >> /tmp/pr-report.md

          echo "### Features (MEDIUM/LOW)" >> /tmp/pr-report.md
          echo "| PR | Title | Author | Lines |" >> /tmp/pr-report.md
          echo "|---|---|---|---|" >> /tmp/pr-report.md
          grep -iE "feat|add|implement|support" /tmp/upstream-prs.txt | while IFS='|' read -r num title author created adds dels; do
            echo "| #$num | $title | @$author | +$adds/-$dels |" >> /tmp/pr-report.md
          done
          echo "" >> /tmp/pr-report.md

          echo "### Build/Docs/Other" >> /tmp/pr-report.md
          echo "| PR | Title | Author | Lines |" >> /tmp/pr-report.md
          echo "|---|---|---|---|" >> /tmp/pr-report.md
          grep -viE "fix|security|crash|feat|add|implement|support" /tmp/upstream-prs.txt | while IFS='|' read -r num title author created adds dels; do
            echo "| #$num | $title | @$author | +$adds/-$dels |" >> /tmp/pr-report.md
          done

          cat /tmp/pr-report.md

      - name: Test patch applicability
        run: |
          echo "" >> /tmp/pr-report.md
          echo "### Patch Applicability Test" >> /tmp/pr-report.md
          echo "| PR | Applies Clean? |" >> /tmp/pr-report.md
          echo "|---|---|" >> /tmp/pr-report.md

          while IFS='|' read -r num title rest; do
            gh pr diff "$num" --repo nextlevelbuilder/goclaw > /tmp/pr_$num.patch 2>/dev/null || continue
            if git apply --check /tmp/pr_$num.patch 2>/dev/null; then
              echo "| #$num | ✅ Clean |" >> /tmp/pr-report.md
            else
              echo "| #$num | ⚠️ Conflicts |" >> /tmp/pr-report.md
            fi
          done < /tmp/upstream-prs.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update tracking issue
        if: steps.fetch-prs.outputs.total_prs > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat /tmp/pr-report.md)
          EXISTING=$(gh issue list --repo vellus-ai/argoclaw --label "upstream-monitor" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo vellus-ai/argoclaw --body "$REPORT"
          else
            gh issue create --repo vellus-ai/argoclaw \
              --title "🔍 GoClaw Upstream PR Monitor" \
              --label "upstream-monitor" \
              --body "$REPORT"
          fi

      - name: Send email notification via Resend
        if: steps.fetch-prs.outputs.total_prs > 0
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          REPORT=$(cat /tmp/pr-report.md)
          TOTAL=${{ steps.fetch-prs.outputs.total_prs }}
          DATE=$(date -u '+%Y-%m-%d')

          # Convert markdown to basic HTML
          HTML_REPORT=$(echo "$REPORT" | sed \
            -e 's/^## \(.*\)/<h2>\1<\/h2>/g' \
            -e 's/^### \(.*\)/<h3>\1<\/h3>/g' \
            -e 's/| --- |/|---|/g' \
            -e 's/^|/<tr><td>/g' \
            -e 's/|$/<\/td><\/tr>/g' \
            -e 's/|/<\/td><td>/g' \
            -e 's/✅/<span style="color:green">✅<\/span>/g' \
            -e 's/⚠️/<span style="color:orange">⚠️<\/span>/g')

          # Build email body
          EMAIL_BODY=$(cat <<EMAILEOF
          <div style="font-family: -apple-system, sans-serif; max-width: 700px; margin: 0 auto; background: #0a1628; color: #e2e8f0; padding: 32px; border-radius: 12px;">
            <div style="text-align: center; margin-bottom: 24px;">
              <span style="font-size: 32px;">⚓</span>
              <h1 style="color: #3b82f6; margin: 8px 0;">ARGO — Upstream Monitor</h1>
              <p style="color: #94a3b8;">Relatório diário de PRs da comunidade GoClaw</p>
              <p style="color: #64748b; font-size: 12px;">$DATE • $TOTAL PRs abertos</p>
            </div>
            <div style="background: #1e293b; border-radius: 8px; padding: 24px; font-size: 14px;">
              <pre style="white-space: pre-wrap; color: #e2e8f0;">$REPORT</pre>
            </div>
            <div style="text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid #334155;">
              <a href="https://github.com/vellus-ai/argoclaw/issues?q=label:upstream-monitor" style="color: #3b82f6; text-decoration: none;">Ver Issue no GitHub →</a>
              <p style="color: #475569; font-size: 11px; margin-top: 12px;">ARGO by Vellus • Upstream PR Monitor</p>
            </div>
          </div>
          EMAILEOF
          )

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "ARGO Monitor <noreply@consilium.tec.br>" \
              --arg to "milton@vellus.tech" \
              --arg subject "⚓ ARGO Upstream Report — $DATE — $TOTAL PRs" \
              --arg html "$EMAIL_BODY" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"

      # Optional: Notify via Telegram (requires TELEGRAM_BOT_TOKEN secret)
      # - name: Notify Telegram
      #   if: steps.fetch-prs.outputs.total_prs > 0
      #   run: |
      #     MSG="🔍 *GoClaw Upstream Report*%0A${{ steps.fetch-prs.outputs.total_prs }} PRs abertos"
      #     curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
      #       -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
      #       -d "text=$MSG" \
      #       -d "parse_mode=Markdown"
