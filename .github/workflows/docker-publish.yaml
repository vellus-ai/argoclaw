name: Publish Docker Images

on:
  push:
    tags:
      - "v*.*.*"

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: digitop/argoclaw
  GAR_IMAGE: us-central1-docker.pkg.dev/vellus-ai-agent-platform/argoclaw/argoclaw

permissions:
  contents: read
  packages: write
  id-token: write  # Workload Identity Federation para GAR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # ── Runtime variants ──
          - variant: latest
            suffix: ""
            enable_web_ui: "false"
            enable_otel: "false"
            enable_tsnet: "false"
            enable_redis: "false"
            enable_node: "false"
            enable_python: "false"
            enable_full_skills: "false"
          - variant: node
            suffix: "-node"
            enable_web_ui: "false"
            enable_otel: "false"
            enable_tsnet: "false"
            enable_redis: "false"
            enable_node: "true"
            enable_python: "false"
            enable_full_skills: "false"
          - variant: python
            suffix: "-python"
            enable_web_ui: "false"
            enable_otel: "false"
            enable_tsnet: "false"
            enable_redis: "false"
            enable_node: "false"
            enable_python: "true"
            enable_full_skills: "false"
          - variant: full
            suffix: "-full"
            enable_web_ui: "false"
            enable_otel: "false"
            enable_tsnet: "false"
            enable_redis: "false"
            enable_node: "true"
            enable_python: "true"
            enable_full_skills: "true"
          # ── Web UI variant (React SPA embedded in binary) ──
          # Issue #33: combines security patches (appsec-tenant-isolation, appsec-branding-validation)
          # with the embedded React SPA. Built from main HEAD which already includes both.
          - variant: webui
            suffix: "-webui"
            enable_web_ui: "true"
            enable_otel: "false"
            enable_tsnet: "false"
            enable_redis: "false"
            enable_node: "false"
            enable_python: "false"
            enable_full_skills: "false"
          # ── Build-tag variants ──
          - variant: otel
            suffix: "-otel"
            enable_web_ui: "false"
            enable_otel: "true"
            enable_tsnet: "false"
            enable_redis: "false"
            enable_node: "false"
            enable_python: "false"
            enable_full_skills: "false"
          - variant: tsnet
            suffix: "-tsnet"
            enable_web_ui: "false"
            enable_otel: "false"
            enable_tsnet: "true"
            enable_redis: "false"
            enable_node: "false"
            enable_python: "false"
            enable_full_skills: "false"
          - variant: redis
            suffix: "-redis"
            enable_web_ui: "false"
            enable_otel: "false"
            enable_tsnet: "false"
            enable_redis: "true"
            enable_node: "false"
            enable_python: "false"
            enable_full_skills: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GAR_IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.suffix }}
            type=raw,value=latest,enable=${{ matrix.suffix == '' }},suffix=
            type=raw,value=${{ matrix.variant }},enable=${{ matrix.suffix != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENABLE_WEB_UI=${{ matrix.enable_web_ui || 'false' }}
            ENABLE_OTEL=${{ matrix.enable_otel }}
            ENABLE_TSNET=${{ matrix.enable_tsnet }}
            ENABLE_REDIS=${{ matrix.enable_redis }}
            ENABLE_NODE=${{ matrix.enable_node }}
            ENABLE_PYTHON=${{ matrix.enable_python }}
            ENABLE_FULL_SKILLS=${{ matrix.enable_full_skills }}
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  build-and-push-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}-web
            ${{ env.DOCKERHUB_IMAGE }}-web
            ${{ env.GAR_IMAGE }}-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ui/web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
