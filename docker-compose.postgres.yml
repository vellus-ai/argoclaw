# PostgreSQL overlay — pgvector for multi-tenant storage.
#
# Usage (with Web Dashboard):
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.selfservice.yml up -d --build
#
# Required env vars (set in .env or shell):
#   ARGOCLAW_OPENROUTER_API_KEY (or another provider key)
#   POSTGRES_PASSWORD (defaults to "argoclaw" for dev)

services:
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argoclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argoclaw}
      POSTGRES_DB: ${POSTGRES_DB:-argoclaw}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argoclaw} -d ${POSTGRES_DB:-argoclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  argoclaw:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ARGOCLAW_POSTGRES_DSN=postgres://${POSTGRES_USER:-argoclaw}:${POSTGRES_PASSWORD:-argoclaw}@postgres:5432/${POSTGRES_DB:-argoclaw}?sslmode=disable
    volumes:
      - argoclaw-skills:/app/skills
      - argoclaw-workspace:/app/.argoclaw

volumes:
  postgres-data:
  argoclaw-skills:
